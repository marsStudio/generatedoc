<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dokumen Indonesia — v2 Full Templates</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--r:#c0392b;--rd:#a93226;--rl:#fff0ee;--rm:#e74c3c;
--b:#1a3a5c;--bm:#2471a3;--bl:#eaf3fb;
--g:#d4a017;--gl:#fffaeb;
--gn:#155a32;--gnm:#1e8449;--gnl:#e9f7ef;
--p:#5b2d8e;--pl:#f3eeff;
--i:#111827;--i2:#374151;--i3:#6b7280;--i4:#9ca3af;
--s:#fff;--bg:#f5f6f8;--bg2:#edf0f3;
--bd:#e5e7eb;--bd2:#d1d5db;
--fh:'Syne',sans-serif;--fb:'Plus Jakarta Sans',sans-serif;
--sh1:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.08);--sh3:0 8px 32px rgba(0,0,0,.14);
}
[data-dark]{
--r:#e05c4d;--rd:#c0392b;--rl:#2d1a18;--rm:#e74c3c;
--b:#4a9fdb;--bm:#5dade2;--bl:#0f1f2d;
--g:#f0b429;--gl:#2a1f00;
--gn:#2ecc71;--gnm:#27ae60;--gnl:#0a1f0f;
--p:#a855f7;--pl:#1e0a36;
--i:#f3f4f6;--i2:#d1d5db;--i3:#9ca3af;--i4:#6b7280;
--s:#1e2024;--bg:#16181c;--bg2:#252830;
--bd:#2d3139;--bd2:#3d4350;
}
body{font-family:var(--fb);background:var(--bg);color:var(--i);min-height:100vh;font-size:14px;line-height:1.6;transition:background .25s,color .25s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* NAV */
.nav{height:54px;background:var(--s);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:300}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-m{width:30px;height:30px;background:var(--r);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fh);font-weight:800;font-size:13px}
.logo-t{font-family:var(--fh);font-weight:700;font-size:14px;color:var(--i)}
.logo-t em{color:var(--r);font-style:normal}
.nav-links{display:flex;gap:2px;margin-left:8px}
.nl{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:500;color:var(--i3);cursor:pointer;border:none;background:none;font-family:var(--fb);transition:all .15s}
.nl:hover{color:var(--i);background:var(--bg2)}
.nl.on{color:var(--r);background:var(--rl);font-weight:600}
.nav-r{display:flex;align-items:center;gap:7px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--fb);transition:all .18s;line-height:1}
.btn i{font-size:14px}
.btn-ghost{background:transparent;color:var(--i3);border:1px solid var(--bd)}
.btn-ghost:hover{color:var(--i);border-color:var(--bd2);background:var(--bg2)}
.btn-red{background:var(--r);color:#fff}
.btn-red:hover{background:var(--rd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(192,57,43,.3)}
.btn-blue{background:var(--b);color:#fff}
.btn-blue:hover{opacity:.9}
.btn-green{background:var(--gnm);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-lg{padding:10px 20px;font-size:13px;border-radius:9px}
.ibt{width:32px;height:32px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--i3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.ibt:hover{color:var(--i);background:var(--bg2)}

/* LAYOUT */
.shell{display:flex;height:calc(100vh - 54px);overflow:hidden}

/* LEFT SIDEBAR */
.lsb{width:240px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.lsb-search{padding:12px 14px;border-bottom:1px solid var(--bd)}
.lsb-search-input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--bd2);border-radius:7px;font-size:12px;font-family:var(--fb);color:var(--i);background:var(--bg);outline:none;transition:border-color .15s}
.lsb-search-input:focus{border-color:var(--r)}
.lsb-search-input::placeholder{color:var(--i4)}
.lsb-search-wrap{position:relative}
.lsb-search-wrap i{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--i4);font-size:15px}
.lsb-scroll{flex:1;overflow-y:auto;padding:8px 0}
.lsb-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--i4);padding:10px 14px 5px}
.lsb-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--i3);transition:all .15s;border-right:2px solid transparent}
.lsb-item:hover{background:var(--bg2);color:var(--i)}
.lsb-item.on{background:var(--rl);color:var(--r);border-right-color:var(--r);font-weight:700}
.lsb-item i{font-size:14px;flex-shrink:0}
.lsb-item .badge-pill{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.bp-free{background:var(--gnl);color:var(--gn)}
.bp-pro{background:var(--gl);color:var(--g)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* GEN TOPBAR */
.gen-top{padding:14px 22px;border-bottom:1px solid var(--bd);background:var(--s);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gen-title{font-family:var(--fh);font-size:17px;font-weight:800;color:var(--i)}
.gen-meta{font-size:11px;color:var(--i4);margin-top:2px;display:flex;align-items:center;gap:8px}
.cpill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800}
.cp-red{background:var(--rl);color:var(--r)}
.cp-blue{background:var(--bl);color:var(--bm)}
.cp-gold{background:var(--gl);color:var(--g)}
.cp-green{background:var(--gnl);color:var(--gnm)}
.cp-purple{background:var(--pl);color:var(--p)}

/* BODY SPLIT */
.gen-body{flex:1;display:grid;grid-template-columns:1fr 340px;overflow:hidden}
.form-col{overflow-y:auto;padding:22px 24px}
.prev-col{border-left:1px solid var(--bd);background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.prev-head{padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--s);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.prev-head span{font-size:12px;font-weight:700;color:var(--i)}
.live-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--gnm);background:var(--gnl);padding:2px 9px;border-radius:20px}
.live-dot{width:5px;height:5px;background:var(--gnm);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.prev-scroll{flex:1;overflow-y:auto;padding:14px}
.prev-actions{padding:12px 14px;border-top:1px solid var(--bd);background:var(--s);flex-shrink:0}
.exp-row{display:flex;gap:8px}
.exp-btn{flex:1;padding:8px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--fb);border:none;transition:all .18s}
.exp-docx{background:var(--bl);color:var(--bm);border:1px solid rgba(36,113,163,.2)}
.exp-docx:hover{background:#c5dff8}
.exp-pdf{background:var(--rl);color:var(--r);border:1px solid rgba(192,57,43,.2)}
.exp-pdf:hover{background:#ffd9d4}

/* FORM ELEMENTS */
.fsec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--i3);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.fsec::after{content:'';flex:1;height:1px;background:var(--bd)}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--i2);margin-bottom:5px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.03em}
.fl .req{color:var(--r)}
.fi{width:100%;padding:8px 11px;border:1px solid var(--bd2);border-radius:7px;font-size:13px;font-family:var(--fb);color:var(--i);background:var(--s);transition:all .15s;outline:none}
.fi:focus{border-color:var(--r);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.fi::placeholder{color:var(--i4)}
textarea.fi{resize:vertical;min-height:64px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.fhint{font-size:10px;color:var(--i4);margin-top:3px;display:flex;align-items:center;gap:3px}
.upload-z{border:1.5px dashed var(--bd2);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .18s;background:var(--bg)}
.upload-z:hover{border-color:var(--r);background:var(--rl)}
.upload-z i{font-size:22px;color:var(--i4);display:block;margin-bottom:5px}
.upload-z p{font-size:12px;color:var(--i3)}
.upload-z span{font-size:10px;color:var(--i4)}
.upload-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}

/* INVOICE ITEMS TABLE */
.inv-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:11px}
.inv-table th{background:var(--bg2);padding:7px 10px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--i3);border:1px solid var(--bd)}
.inv-table td{padding:7px 10px;border:1px solid var(--bd)}
.inv-table td input,.inv-table td select{width:100%;border:none;background:transparent;font-size:11px;font-family:var(--fb);color:var(--i);outline:none;padding:2px 0}
.inv-table tr:last-child td{border-bottom:1px solid var(--bd)}
.add-row-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--bm);cursor:pointer;padding:6px 0;border:none;background:none;font-family:var(--fb)}
.add-row-btn:hover{color:var(--r)}
.inv-total-row{background:var(--rl)}
.inv-total-row td{font-weight:700;color:var(--r)}

/* JSON BOX */
.json-box{background:var(--i);color:#a8d8a8;border-radius:9px;padding:13px 15px;font-family:'Courier New',monospace;font-size:10.5px;line-height:1.75;overflow-x:auto;white-space:pre;margin-top:13px;border:1px solid var(--bd);display:none}
.json-box.open{display:block}

/* DOCUMENT PAPER */
.doc-paper{background:#fff;border-radius:6px;box-shadow:var(--sh2);padding:24px 22px;font-size:9.5px;line-height:1.85;color:#111;min-height:460px;font-family:'Times New Roman',serif}
.doc-paper h3,.doc-paper h2,.doc-paper p,.doc-paper td,.doc-paper th{color:#111}
.dp-lh{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:3px double #c0392b}
.dp-logo-box{width:48px;height:48px;background:#f0f0f0;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;flex-shrink:0}
.dp-org-name{font-size:10.5px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:#111;font-family:Arial,sans-serif;margin-bottom:2px}
.dp-org-sub{font-size:8.5px;color:#555;font-family:Arial,sans-serif}
.dp-doc-title{text-align:center;font-family:Arial,sans-serif;margin:12px 0 4px}
.dp-doc-title h2{font-size:11.5px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;text-decoration:underline;color:#111}
.dp-doc-num{text-align:center;font-size:8.5px;color:#555;font-family:Arial,sans-serif;margin-bottom:10px}
.dp-body{font-family:Arial,sans-serif}
.dp-body p{font-size:9.5px;margin-bottom:5px;color:#111}
.dp-tbl{width:100%;font-family:Arial,sans-serif;border-collapse:collapse;font-size:9px;margin:8px 0}
.dp-tbl td:first-child{width:36%;color:#555;vertical-align:top}
.dp-tbl td:nth-child(2){width:5%;vertical-align:top}
.dp-sign{margin-top:20px;display:flex;justify-content:flex-end;font-family:Arial,sans-serif}
.dp-sign-box{text-align:center}
.dp-sign-box p{font-size:9px;color:#111}
.dp-sign-line{height:1px;background:#111;width:110px;margin:26px auto 5px}

/* INVOICE PREVIEW */
.inv-prev-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #c0392b}
.inv-prev-from{font-family:Arial,sans-serif;font-size:9px;color:#555}
.inv-prev-from strong{font-size:11px;color:#111;display:block;margin-bottom:2px}
.inv-badge{background:#c0392b;color:#fff;font-size:13px;font-weight:900;font-family:Arial,sans-serif;padding:4px 12px;border-radius:2px}
.inv-prev-tbl{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:8.5px;margin:10px 0}
.inv-prev-tbl th{background:#f0f0f0;padding:5px 8px;text-align:left;font-weight:700;color:#333;border-bottom:1px solid #ddd}
.inv-prev-tbl td{padding:5px 8px;border-bottom:1px solid #eee;color:#333}
.inv-prev-tbl .num{text-align:right}
.inv-total-box{display:flex;flex-direction:column;align-items:flex-end;font-family:Arial,sans-serif;margin-top:10px}
.inv-total-row-p{display:flex;gap:20px;font-size:8.5px;color:#555;margin-bottom:3px}
.inv-total-row-p.grand{font-size:10px;font-weight:900;color:#c0392b}

/* SLIP GAJI */
.slip-header{background:#1a3a5c;color:#fff;padding:12px 14px;border-radius:4px 4px 0 0;font-family:Arial,sans-serif;display:flex;justify-content:space-between;align-items:center;margin-bottom:0}
.slip-header h3{font-size:11px;font-weight:700;color:#fff}
.slip-header p{font-size:8.5px;color:rgba(255,255,255,.7);margin-top:2px}
.slip-body{border:1px solid #ddd;border-top:none;font-family:Arial,sans-serif}
.slip-row{display:flex;justify-content:space-between;padding:5px 14px;border-bottom:1px solid #eee;font-size:8.5px;color:#333}
.slip-row.total{background:#f8f8f8;font-weight:700;font-size:9.5px;color:#1a3a5c}
.slip-row.gaji-pokok{background:#eaf3fb}
.slip-section{background:#f0f0f0;padding:4px 14px;font-size:8px;font-weight:700;text-transform:uppercase;color:#666;letter-spacing:.04em}

/* CONTRACT PREVIEW */
.contract-intro{font-size:9.5px;font-family:Arial,sans-serif;color:#333;text-align:justify;margin-bottom:8px;line-height:1.7}
.contract-pasal{font-size:10px;font-weight:700;font-family:Arial,sans-serif;color:#1a3a5c;margin:10px 0 4px;text-transform:uppercase}
.contract-point{font-size:9px;font-family:Arial,sans-serif;color:#333;padding-left:14px;margin-bottom:3px;line-height:1.6}
.contract-sign-row{display:flex;justify-content:space-between;margin-top:20px;font-family:Arial,sans-serif}
.contract-sign-col{text-align:center;width:45%}
.contract-sign-col p{font-size:9px;color:#333}
.contract-sign-line{height:1px;background:#333;width:90%;margin:24px auto 5px}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--i);color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--sh3);transform:translateX(110%);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:none}

/* STEPS */
.steps-bar{display:flex;align-items:center;gap:0;padding:11px 22px;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0}
.step{display:flex;align-items:center;gap:8px}
.step-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--i4);flex-shrink:0;background:var(--s)}
.step.done .step-dot{background:var(--gnm);border-color:var(--gnm);color:#fff}
.step.active .step-dot{background:var(--r);border-color:var(--r);color:#fff}
.step-label{font-size:11px;font-weight:600;color:var(--i4)}
.step.active .step-label{color:var(--r)}
.step.done .step-label{color:var(--gnm)}
.step-line{flex:1;height:1px;background:var(--bd);margin:0 10px}

@media(max-width:768px){
.lsb{display:none}.gen-body{grid-template-columns:1fr}.prev-col{display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo" onclick="navTo('home')">
    <div class="logo-m">AI</div>
    <div class="logo-t">Dokumen<em>Indonesia</em></div>
  </div>
  <div class="nav-links">
    <button class="nl" id="nl-home" onclick="navTo('home')">Beranda</button>
    <button class="nl on" id="nl-gen" onclick="navTo('gen')">Generator</button>
    <button class="nl" id="nl-history" onclick="navTo('history')">Riwayat</button>
    <button class="nl" id="nl-admin" onclick="navTo('admin')">Admin</button>
  </div>
  <div class="nav-r">
    <button class="ibt" onclick="toggleDark()" id="dk-btn" title="Dark mode"><i class="ti ti-moon"></i></button>
    <button class="ibt" onclick="toggleJSON()" title="Lihat JSON"><i class="ti ti-code"></i></button>
    <button class="btn btn-ghost btn-sm" onclick="exportDoc('DOCX')"><i class="ti ti-file-word"></i> DOCX</button>
    <button class="btn btn-red btn-sm" onclick="exportDoc('PDF')"><i class="ti ti-file-type-pdf"></i> PDF</button>
  </div>
</nav>

<!-- SHELL: SIDEBAR + MAIN -->
<div class="shell">

  <!-- LEFT SIDEBAR -->
  <div class="lsb">
    <div class="lsb-search">
      <div class="lsb-search-wrap">
        <i class="ti ti-search"></i>
        <input class="lsb-search-input" id="tmpl-search" placeholder="Cari template..." oninput="filterSidebar(this.value)">
      </div>
    </div>
    <div class="lsb-scroll" id="sidebar-list"></div>
  </div>

  <!-- MAIN AREA -->
  <div class="main" id="main-area">

    <!-- STEPS BAR -->
    <div class="steps-bar">
      <div class="step done" id="st1"><div class="step-dot"><i class="ti ti-check" style="font-size:11px"></i></div><div class="step-label">Pilih Template</div></div>
      <div class="step-line"></div>
      <div class="step active" id="st2"><div class="step-dot">2</div><div class="step-label">Isi Data</div></div>
      <div class="step-line"></div>
      <div class="step" id="st3"><div class="step-dot">3</div><div class="step-label">Preview & Export</div></div>
    </div>

    <!-- GEN TOPBAR -->
    <div class="gen-top">
      <div>
        <div class="gen-title" id="gen-title">Surat Pengantar RT/RW</div>
        <div class="gen-meta">
          <span class="cpill cp-red" id="gen-cat">Surat Warga</span>
          <span>Format resmi Indonesia</span>
          <span>·</span>
          <span>Auto nomor surat</span>
        </div>
      </div>
      <div style="display:flex;gap:7px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="resetForm()"><i class="ti ti-refresh"></i> Reset</button>
        <button class="btn btn-red btn-sm" onclick="doGenerate()"><i class="ti ti-sparkles"></i> Generate</button>
      </div>
    </div>

    <!-- BODY SPLIT -->
    <div class="gen-body">

      <!-- FORM COLUMN -->
      <div class="form-col" id="form-col"></div>

      <!-- PREVIEW COLUMN -->
      <div class="prev-col">
        <div class="prev-head">
          <span><i class="ti ti-file-text" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Preview</span>
          <div class="live-pill"><div class="live-dot"></div>Live</div>
        </div>
        <div class="prev-scroll">
          <div class="doc-paper" id="doc-preview"></div>
        </div>
        <div class="prev-actions">
          <div style="font-size:10px;color:var(--i4);text-align:center;margin-bottom:7px">Siap diexport</div>
          <div class="exp-row">
            <button class="exp-btn exp-docx" onclick="exportDoc('DOCX')"><i class="ti ti-file-word"></i> DOCX</button>
            <button class="exp-btn exp-pdf" onclick="exportDoc('PDF')"><i class="ti ti-file-type-pdf"></i> PDF</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ═══════════════ DATA ═══════════════
const CATS = {
  warga:{label:'Surat Warga',color:'cp-red',icon:'ti-home'},

let currentTmpl = TEMPLATES[0];
let invItems = [{desc:'',qty:1,harga:0}];

// ═══════════════ SIDEBAR RENDER ═══════════════
function buildSidebar(search='') {
  const cats = ['warga','bisnis','hr','legal','karier','rtrw'];
  let html = '';
  cats.forEach(cat => {
    const items = TEMPLATES.filter(t => t.cat===cat && t.name.toLowerCase().includes(search.toLowerCase()));
    if(!items.length) return;
    html += `<div class="lsb-cat">${CATS[cat].label}</div>`;
    items.forEach(t => {
      html += `<div class="lsb-item ${t.id===currentTmpl.id?'on':''}" onclick="selectTemplate('${t.id}')">
        <i class="ti ${CATS[t.cat].icon}"></i>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</span>
        <span class="badge-pill ${t.free?'bp-free':'bp-pro'}">${t.free?'Free':'Pro'}</span>
      </div>`;
    });
  });
  document.getElementById('sidebar-list').innerHTML = html;
}

function filterSidebar(val) { buildSidebar(val); }

// ═══════════════ FORM RENDER ═══════════════
function selectTemplate(id) {
  currentTmpl = TEMPLATES.find(t=>t.id===id)||TEMPLATES[0];
  step3done=false;
  const s3=document.getElementById('st3');s3.className='step';s3.querySelector('.step-dot').textContent='3';
  const s2=document.getElementById('st2');s2.className='step active';s2.querySelector('.step-dot').textContent='2';
  renderForm();
  buildSidebar(document.getElementById('tmpl-search').value);
  document.getElementById('gen-title').textContent=currentTmpl.name;
  const cat=CATS[currentTmpl.cat];
  const pill=document.getElementById('gen-cat');
  pill.textContent=cat.label;pill.className='cpill '+cat.color;
  updatePreview();
}

function renderForm() {
  const def = FORMS[currentTmpl.id] || getFallbackForm(currentTmpl);
  let html = '';

  // Invoice mode: items table
  if(def.invoiceMode) {
    html += renderInvoiceExtras();
  }

  if(def.upload) {
    html += `<div class="fsec">Identitas & Upload</div>
    <div class="upload-row">
      <div class="upload-z" onclick="toast('📤','Pilih file logo...')">
        <i class="ti ti-photo"></i><p>Upload Logo</p><span>PNG/JPG maks 2MB</span>
      </div>
      <div class="upload-z" onclick="toast('✍️','Upload tanda tangan...')">
        <i class="ti ti-writing"></i><p>Tanda Tangan</p><span>PNG transparan</span>
      </div>
    </div>`;
  }

  def.sections.forEach(sec => {
    html += `<div class="fsec">${sec.title}</div>`;
    sec.fields.forEach(field => {
      if(Array.isArray(field)) {
        html += `<div class="fr">`;
        field.forEach(f => html += renderField(f));
        html += `</div>`;
      } else {
        html += renderField(field);
      }
    });
  });

  // JSON box
  html += `<div class="json-box ${jsonOpen?'open':''}" id="json-box"></div>`;
  html += `<div style="display:flex;gap:9px;margin-top:20px;flex-wrap:wrap">
    <button class="btn btn-ghost" onclick="toggleJSON()"><i class="ti ti-code"></i> JSON</button>
    <button class="btn btn-red" style="flex:1" onclick="doGenerate()"><i class="ti ti-sparkles"></i> Generate Dokumen</button>
  </div>`;

  document.getElementById('form-col').innerHTML = html;
  // Set default date
  document.querySelectorAll('input[type="date"]').forEach(d=>{if(!d.value)d.value=new Date().toISOString().split('T')[0]});
  document.querySelectorAll('.fi').forEach(el=>el.addEventListener('input',updatePreview));
  document.querySelectorAll('select.fi').forEach(el=>el.addEventListener('change',updatePreview));
  updatePreview();
}

function renderField(f) {
  const req = f.req ? '<span class="req"> *</span>':'';
  const hint = f.hint ? `<div class="fhint"><i class="ti ti-info-circle" style="font-size:11px"></i>${f.hint}</div>`:'' ;
  if(f.type==='textarea') return `<div class="fg"><label class="fl">${f.label}${req}</label><textarea class="fi" id="f-${f.id}" placeholder="${f.ph||''}" oninput="updatePreview()">${f.val||''}</textarea>${hint}</div>`;
  if(f.type==='select') return `<div class="fg"><label class="fl">${f.label}${req}</label><select class="fi" id="f-${f.id}" onchange="updatePreview()">${(f.opts||[]).map(o=>`<option>${o}</option>`).join('')}</select>${hint}</div>`;
  if(f.type==='date') return `<div class="fg"><label class="fl">${f.label}${req}</label><input type="date" class="fi" id="f-${f.id}" oninput="updatePreview()"></div>`;
  return `<div class="fg"><label class="fl">${f.label}${req}</label><input type="text" class="fi" id="f-${f.id}" placeholder="${f.ph||''}" value="${f.val||''}" ${f.maxlen?'maxlength="'+f.maxlen+'"':''} oninput="updatePreview()">${hint}</div>`;
}

function renderInvoiceExtras() {
  let rows = invItems.map((it,i)=>`
    <tr>
      <td><input placeholder="Deskripsi jasa/produk" value="${it.desc}" oninput="invItems[${i}].desc=this.value;updatePreview()"></td>
      <td style="width:50px"><input type="number" value="${it.qty}" min="1" oninput="invItems[${i}].qty=+this.value;updatePreview()" style="text-align:center"></td>
      <td><input type="number" value="${it.harga}" placeholder="0" oninput="invItems[${i}].harga=+this.value;updatePreview()"></td>
      <td style="width:80px;text-align:right;font-weight:600">${fmt(it.qty*it.harga)}</td>
      <td style="width:28px;text-align:center"><button onclick="removeInvRow(${i})" style="background:none;border:none;cursor:pointer;color:var(--r);font-size:13px"><i class="ti ti-trash"></i></button></td>
    </tr>`).join('');
  const sub = invItems.reduce((a,it)=>a+it.qty*it.harga,0);
  const ppn = Math.round(sub*0.11);
  const total = sub+ppn;
  return `<div class="fsec">Item / Jasa</div>
  <table class="inv-table">
    <thead><tr><th>Deskripsi</th><th>Qty</th><th>Harga Satuan (Rp)</th><th>Subtotal</th><th></th></tr></thead>
    <tbody id="inv-tbody">${rows}</tbody>
    <tr class="inv-total-row"><td colspan="3" style="text-align:right;padding-right:10px">Subtotal</td><td>${fmt(sub)}</td><td></td></tr>
    <tr class="inv-total-row"><td colspan="3" style="text-align:right;padding-right:10px">PPN 11%</td><td>${fmt(ppn)}</td><td></td></tr>
    <tr class="inv-total-row" style="font-size:12px"><td colspan="3" style="text-align:right;padding-right:10px">TOTAL</td><td>${fmt(total)}</td><td></td></tr>
  </table>
  <button class="add-row-btn" onclick="addInvRow()"><i class="ti ti-plus"></i> Tambah Item</button>`;
}

function updatePreview(){
  const prev = document.getElementById('doc-preview');
  if(!prev) return;
  const id = currentTmpl.id;

  // Dispatch to appropriate preview builder
  if(id==='invoice') prev.innerHTML = buildInvoicePreview();
  else if(id==='slip_gaji') prev.innerHTML = buildSlipGajiPreview();
  else if(id==='kontrak'||id==='nda'||id==='mou'||id==='pks'||id==='freelance'||id==='hutang'||id==='sewa') prev.innerHTML = buildContractPreview();
  else if(id==='lamaran'||id==='resign'||id==='cover_letter') prev.innerHTML = buildSuratResmiPreview();
  else if(id==='kwitansi') prev.innerHTML = buildKwitansiPreview();
  else if(id==='offering') prev.innerHTML = buildOfferingPreview();
  else if(id==='warning') prev.innerHTML = buildWarningPreview();
  else if(id==='form_cuti') prev.innerHTML = buildCutiPreview();
  else prev.innerHTML = buildSuratWargaPreview();

  updateJSONBox();
}

// ═══════════════ JSON BOX ═══════════════
function updateJSONBox(){
  const box=document.getElementById('json-box');
  if(!box) return;
  const def=FORMS[currentTmpl.id]||getFallbackForm(currentTmpl);
  const data={template:currentTmpl.id,template_name:currentTmpl.name,category:currentTmpl.cat};
  const inputs=document.querySelectorAll('.fi');
  inputs.forEach(el=>{if(el.id&&el.id.startsWith('f-')){data[el.id.slice(2)]=el.value}});
  if(currentTmpl.id==='invoice') data.items=invItems;
  data._engine='Docxtemplater+PizZip';
  data._generated=new Date().toISOString();
  box.textContent=JSON.stringify(data,null,2);
}

function toggleJSON(){
  jsonOpen=!jsonOpen;
  const box=document.getElementById('json-box');
  if(box) box.classList.toggle('open',jsonOpen);
  updateJSONBox();
}

// ═══════════════ GENERATE & EXPORT ═══════════════
function doGenerate(){
  step3done=true;
  const s2=document.getElementById('st2');
  s2.className='step done';s2.querySelector('.step-dot').innerHTML='<i class="ti ti-check" style="font-size:11px"></i>';
  const s3=document.getElementById('st3');
  s3.className='step active';s3.querySelector('.step-dot').textContent='3';
  toast('✅',`${currentTmpl.name} berhasil digenerate!`);
}

function exportDoc(fmt){
  if(!step3done) doGenerate();
  toast(fmt==='DOCX'?'📄':'📋',`Mengunduh ${currentTmpl.name} — ${fmt}...`);
}

function resetForm(){
  document.querySelectorAll('.fi').forEach(el=>{
    if(el.tagName==='SELECT'){el.selectedIndex=0}
    else if(el.type==='date'){el.value=new Date().toISOString().split('T')[0]}
    else if(!el.id||!el.id.match(/f-nomor|f-inv_no|f-hukum/)){el.value=''}
  });
  step3done=false;
  const s2=document.getElementById('st2');s2.className='step active';s2.querySelector('.step-dot').textContent='2';
  const s3=document.getElementById('st3');s3.className='step';s3.querySelector('.step-dot').textContent='3';
  updatePreview();
  toast('🔄','Form direset');
}

// ═══════════════ DARK MODE ═══════════════
let dark=false;
function toggleDark(){
  dark=!dark;
  document.documentElement.toggleAttribute('data-dark',dark);
  document.getElementById('dk-btn').innerHTML=dark?'<i class="ti ti-sun"></i>':'<i class="ti ti-moon"></i>';
  toast(dark?'🌙':'☀️',dark?'Dark mode aktif':'Light mode aktif');
}

// ═══════════════ TOAST ═══════════════
function toast(icon,msg){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast';t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400)},3000);
}

// ═══════════════ NAV ═══════════════
function navTo(page){ toast('🔗',`Navigasi ke: ${page}`); }
